<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' | Parcial 4'">Parcial 4</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar" th:fragment="nav(activo)">
    <a class="brand" th:href="@{/}">
        <span class="brand-mark">P4</span>
        <span>Catalogo de videojuegos</span>
    </a>
    <nav class="nav">
        <a th:href="@{/}" th:classappend="${activo == 'inicio'} ? ' active'">Inicio</a>
        <a th:href="@{/videojuegos}" th:classappend="${activo == 'videojuegos'} ? ' active'">Videojuegos</a>
        <a th:href="@{/categorias}" th:classappend="${activo == 'categorias'} ? ' active'">Categorias</a>
        <a th:href="@{/h2-console}" target="_blank">H2 Console</a>
    </nav>
</header>
<div th:fragment="flash" class="flash-wrap">
    <div class="alert success" th:if="${exito}" th:text="${exito}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
</div>
</body>
</html>
